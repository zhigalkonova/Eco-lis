<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Экологический мини-сайт о Лисаковске с интерактивным двуязычным тестом и скидочным купоном."
    />
    <title>EcoQadam | Лисаковск</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="firebase.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar hidden" id="topbar">
        <button class="brand-button" id="homeButton" type="button" aria-label="Home">
          <img src="assets/images/logo.jpg" alt="EcoQadam" class="brand-logo" />
          <span id="brandTitle">EcoQadam</span>
        </button>
        <div class="topbar-actions">
          <span class="language-chip" id="languageChip">RU</span>
          <button class="ghost-button" id="changeLanguageButton" type="button">
            Сменить язык
          </button>
        </div>
      </header>

      <main class="stage" id="app">
        <section class="screen screen-language active" id="languageScreen">
          <div class="language-panel">
            <img src="assets/images/logo.jpg" alt="EcoQadam Logo" class="hero-logo" />
            <div class="language-kicker">EcoQadam</div>
            <h1>Выберите язык</h1>
            <p>
              Пройдя данный тест можно получить скидочный купон на продукцию наших партнеров.
            </p>
            <div class="language-actions" aria-label="Language selection">
              <button class="language-card" type="button" data-lang="kk">
                <span class="flag" aria-hidden="true">🇰🇿</span>
                <span>Қазақша</span>
              </button>
              <button class="language-card" type="button" data-lang="ru">
                <span class="flag" aria-hidden="true">🇷🇺</span>
                <span>Русский</span>
              </button>
            </div>
          </div>
        </section>

        <section class="screen" id="infoScreen">
          <div class="hero-band">
            <div class="hero-content">
              <div class="hero-copy">
                <p class="eyebrow" id="infoEyebrow"></p>
                <h1 id="infoTitle"></h1>
                <p id="infoLead"></p>
                <div class="hero-actions">
                  <button class="primary-button" id="continueButton" type="button"></button>
                </div>
              </div>
              <div class="hero-visual">
                <img
                  src="assets/images/lisakovsk-eco.svg"
                  alt=""
                  loading="eager"
                  decoding="async"
                />
              </div>
            </div>
          </div>

          <div class="content-wrap">
            <section class="stats-grid" id="factsGrid" aria-label="Facts"></section>
            <section class="cards-grid" id="infoCards" aria-label="Information"></section>
            <section class="sources-panel" aria-label="Sources">
              <div>
                <p class="section-label" id="sourcesLabel"></p>
                <h2 id="sourcesTitle"></h2>
              </div>
              <ul id="sourcesList"></ul>
            </section>
          </div>
        </section>

        <!-- SCREEN: RUDNY LANDING -->
        <section class="screen" id="rudnyScreen">
          <div class="content-wrap">
            <div style="padding: 2rem 0; text-align: center;">
              <p class="eyebrow" id="rudnyEyebrow"></p>
              <h1 id="rudnyTitle" style="font-size: clamp(1.8rem, 4vw, 2.5rem); margin-bottom: 1rem;"></h1>
              <p id="rudnyLead" style="color: var(--muted); max-width: 60ch; margin: 0 auto 2rem;"></p>
            </div>
            <div class="facts-grid" id="rudnyFactsGrid"></div>
            <div class="cards-grid" id="rudnyCards"></div>
            <div style="margin-top: 2.5rem; display: flex; gap: 1rem; justify-content: center;">
              <button class="secondary-button" id="rudnyBackButton" type="button"></button>
              <button class="primary-button" id="rudnyContinueButton" type="button"></button>
            </div>
          </div>
        </section>

        <!-- SCREEN: TAZA KZ LANDING -->
        <section class="screen" id="tazaKzScreen">
          <div class="content-wrap">
            <div style="padding: 2rem 0; text-align: center;">
              <p class="eyebrow" id="tazaKzEyebrow"></p>
              <h1 id="tazaKzTitle" style="font-size: clamp(1.8rem, 4vw, 2.5rem); margin-bottom: 1rem;"></h1>
              <p id="tazaKzLead" style="color: var(--muted); max-width: 60ch; margin: 0 auto 2rem;"></p>
            </div>
            <div class="facts-grid" id="tazaKzFactsGrid"></div>
            <div class="cards-grid" id="tazaKzCards"></div>
            <div style="margin-top: 2.5rem; display: flex; gap: 1rem; justify-content: center;">
              <button class="secondary-button" id="tazaKzBackButton" type="button"></button>
              <button class="primary-button" id="tazaKzContinueButton" type="button"></button>
            </div>
          </div>
        </section>

        <section class="screen" id="videoScreen">
          <div class="video-layout">
            <div class="video-copy">
              <p class="eyebrow" id="videoEyebrow"></p>
              <h1 id="videoTitle"></h1>
              <p id="videoLead"></p>
              <div class="status-box" id="videoStatus"></div>
              <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                <button class="secondary-button" id="videoBackButton" type="button">Назад</button>
                <button class="primary-button hidden" id="quizGateButton" type="button"></button>
              </div>
            </div>
            <div class="video-card">
              <div class="video-frame" id="videoFrame">
                <div id="youtube-player"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="screen" id="quizScreen">
          <div class="quiz-shell">
            <div class="quiz-meta">
              <span class="level-badge" id="levelBadge"></span>
              <span id="questionCounter"></span>
            </div>
            <div class="progress-track" aria-hidden="true">
              <div class="progress-fill" id="progressFill"></div>
            </div>
            <article class="question-panel">
              <h1 id="questionText"></h1>
              <div class="answers-grid" id="answersGrid"></div>
              <div style="margin-top: 1.5rem; display: flex; justify-content: flex-end;">
                <button class="secondary-button" id="quizBackButton" type="button">Назад</button>
              </div>
            </article>
          </div>
        </section>

        <section class="screen" id="resultScreen">
          <div class="result-panel">
            <p class="eyebrow" id="resultEyebrow"></p>
            <h1 id="resultTitle"></h1>
            <p id="resultMessage"></p>
            
            <!-- Score Gauge Ring -->
            <div class="score-circle-wrapper">
              <svg class="score-ring" viewBox="0 0 120 120">
                <defs>
                  <linearGradient id="scoreGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#10b981" />
                    <stop offset="100%" stop-color="#0284c7" />
                  </linearGradient>
                </defs>
                <circle class="score-ring-bg" cx="60" cy="60" r="50" />
                <circle class="score-ring-fill" id="scoreRingFill" cx="60" cy="60" r="50" />
              </svg>
              <div class="score-circle-text">
                <span id="scoreTextVal">0%</span>
                <span id="scoreTextSub">Правильно</span>
              </div>
            </div>

            <div class="result-grid" id="resultGrid"></div>

            <!-- Coupon Block -->
            <div class="coupon-container hidden" id="couponContainer">
              <div class="coupon-card">
                <div class="coupon-header">
                  <span class="coupon-badge" id="couponBadge"></span>
                  <h3 id="couponTitle"></h3>
                </div>
                <p id="couponText"></p>
                <button class="primary-button" id="claimCouponButton" type="button"></button>
                
                <div class="coupon-code-box hidden" id="couponCodeBox">
                  <span class="coupon-label" id="couponLabel"></span>
                  <div class="coupon-input-group">
                    <code class="coupon-code" id="couponCode">ECOQR2026</code>
                    <button class="ghost-button" id="copyCouponButton" type="button"></button>
                  </div>
                  <p class="coupon-expiry" id="couponExpiry"></p>
                </div>
              </div>
            </div>

            <!-- Review Section -->
            <div class="review-container hidden" id="reviewContainer">
              <h3 class="review-title" id="reviewTitle">Разбор ваших ответов</h3>
              <div class="review-list" id="reviewList"></div>
            </div>

            <div class="result-actions" id="resultActions"></div>
          </div>
        </section>
      </main>
    </div>

    <noscript>
      Для работы тестирования включите JavaScript в браузере.
    </noscript>
  </body>
</html>
